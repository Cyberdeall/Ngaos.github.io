<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>NGAOS AL FALAH PLOSO</title>

<style>

body{

    margin:0;
    padding:0;

    background:#111;

    color:#fff;

    font-family:Arial,Helvetica,sans-serif;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

}

.container{

    text-align:center;

    width:90%;

    max-width:400px;

}

button{

    margin-top:20px;

    padding:12px 20px;

    border:none;

    border-radius:8px;

    cursor:pointer;

    background:#e53935;

    color:#fff;

    font-size:16px;

}

button:hover{

    opacity:.9;

}

</style>

</head>

<body>

<div class="container">

<h1 id="title">
NGAOS AL FALAH PLOSO
</h1>

<p id="welcome">
Memuat...
</p>

<button id="logoutButton">
Logout
</button>

</div>

<script src="js/config.js"></script>
<script src="js/users.js"></script>
<script src="js/auth.js"></script>

<script>

// =====================================
// WAJIB LOGIN
// =====================================

if(!checkLogin()){

    window.location.replace("index.html");

}

// =====================================
// AMBIL USER
// =====================================

const user=getCurrentUser();

if(user){

    document.getElementById("welcome").textContent=
    "Selamat datang, "+user.username;

}

// =====================================
// TOMBOL LOGOUT
// =====================================

document
.getElementById("logoutButton")
.addEventListener("click",function(){

    logout();

});

// =====================================
// ANTI BACK
// =====================================

history.pushState(null,null,location.href);

window.addEventListener(
"popstate",
function(){

    history.pushState(
        null,
        null,
        location.href
    );

}
);

// =====================================
// REFRESH SESSION
// =====================================

setInterval(function(){

    refreshSession();

},60000);

</script>

</body>

</html>
