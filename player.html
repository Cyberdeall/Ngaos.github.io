<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>NGAOS AL FALAH PLOSO</title>

<link rel="stylesheet" href="css/player.css">

</head>

<body>

<div class="player-container">

    <div class="card">

        <!-- Logo -->

        <div class="logo">

            📻

        </div>

        <!-- Nama -->

        <h1 id="appName">

            NGAOS AL FALAH PLOSO

        </h1>

        <p id="appDesc">

            TAFSIR JALALAIN DAN SHAHIH BUKHARI

        </p>

        <!-- Status -->

        <div class="status">

            <span id="liveDot"></span>

            <span id="liveText">

                OFFLINE

            </span>

        </div>

        <!-- Cover -->

        <div class="cover">

            <img
                id="coverImage"
                src="assets/cover.jpg"
                alt="Cover">

        </div>

        <!-- Audio -->

        <audio
            id="radioPlayer"
            preload="none">
        </audio>

        <!-- Tombol -->

        <div class="controls">

            <button
                id="playButton">

                ▶ PLAY

            </button>

            <button
                id="stopButton">

                ■ STOP

            </button>

        </div>

        <!-- Volume -->

        <div class="volume">

            <label>

                Volume

            </label>

            <input
                type="range"
                id="volumeSlider"
                min="0"
                max="100"
                value="100">

        </div>

        <!-- Loading -->

        <div
            id="loading"
            class="loading">

            Menghubungkan...

        </div>

        <!-- User -->

        <div class="user">

            Login sebagai

            <strong id="currentUser">

                -

            </strong>

        </div>

        <!-- Logout -->

        <button
            id="logoutButton">

            Logout

        </button>

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/users.js"></script>
<script src="js/auth.js"></script>

<script>

if(!checkLogin()){

    window.location.replace(CONFIG.LOGIN_PAGE);

}

</script>

<script src="js/player.js"></script>

</body>

</html>
