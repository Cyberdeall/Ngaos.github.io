<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngaos Al Falah Ploso - Player</title>
    <link rel="stylesheet" href="player.css">
    <!-- Font Awesome untuk ikon tombol -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

    <div class="player-container">
        <!-- Header Atas -->
        <div class="player-header">
            <button class="btn-mini"><i class="fas fa-volume-up"></i></button>
            <span class="live-badge">LIVE</span>
            <button class="btn-mini"><i class="fas fa-bars"></i></button>
        </div>

        <!-- Animasi Piringan Cover -->
        <div class="circle-outer">
            <div class="circle-inner">
                <!-- Ganti logo-alfalah.png dengan logo instansi Anda di github -->
                <img src="logo-alfalah.png" alt="Cover Radio" id="radioCover" class="rotating">
            </div>
        </div>

        <!-- Informasi Judul Siaran -->
        <div class="radio-info">
            <h2 id="radioTitle">NGAOS AL FALAH PLOSO</h2>
            <p id="radioSubtitle">TAFSIR JALALAIN & SHAHIH BUKHARI</p>
            <span id="statusIndicator" class="status-text text-muted">Klik Play untuk Mendengar</span>
        </div>

        <!-- Slider Progress Virtual (Gaya Live) -->
        <div class="progress-container">
            <span class="time-text" id="streamTime">0:00</span>
            <div class="slider-bar">
                <div class="slider-fill" style="width: 75%;"></div>
                <div class="slider-thumb" style="left: 75%;"></div>
            </div>
            <span class="time-text live-text">Live</span>
        </div>

        <!-- Tombol Kontrol Utama (Neumorphism Style) -->
        <div class="player-controls">
            <button class="btn-control"><i class="fas fa-backward"></i></button>
            <button class="btn-main" id="playBtn" onclick="toggleRadio()">
                <i class="fas fa-play" id="playIcon"></i>
            </button>
            <button class="btn-control"><i class="fas fa-forward"></i></button>
        </div>
        
        <!-- Tombol Keluar Kembali ke Login -->
        <button class="btn-logout" onclick="logout()">LOGOUT</button>
    </div>

    <script src="player.js"></script>
</body>
</html>
