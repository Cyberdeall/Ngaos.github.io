<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngaos Al Falah Ploso - Player</title>
    <!-- Font Awesome untuk ikon tombol -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        /* KODE DESAIN CSS LANGSUNG DI SINI AGAR TIDAK EROR */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #1e222b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .player-container {
            background: #232732;
            width: 100%;
            max-width: 380px;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 12px 12px 24px #14161c, -12px -12px 24px #323848;
            text-align: center;
            position: relative;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .live-badge {
            color: #ff5722;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 14px;
        }

        .btn-mini {
            background: #232732;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: #ff5722;
            box-shadow: 4px 4px 8px #14161c, -4px -4px 8px #323848;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .circle-outer {
            width: 220px;
            height: 220px;
            margin: 0 auto 25px auto;
            border-radius: 50%;
            background: #232732;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 8px 8px 16px #14161c, inset -8px -8px 16px #323848;
            position: relative;
        }

        .circle-inner {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 8px 8px 16px #14161c, -8px -8px 16px #323848;
            border: 3px solid #1e222b;
            background: #14161c;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .circle-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rotating {
            animation: spin 15s linear infinite;
            animation-play-state: paused;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .radio-info h2 {
            color: #ffffff;
            font-size: 20px;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .radio-info p {
            color: #8a92a6;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .status-text {
            display: block;
            font-size: 14px;
            font-weight: 500;
        }

        .text-muted { color: #ffe0b2; }
        .text-connecting { color: #ffca28; }
        .text-live { color: #4caf50; font-weight: bold; }

        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 25px 0;
        }

        .time-text {
            color: #8a92a6;
            font-size: 12px;
        }

        .live-text {
            color: #ff5722;
            font-weight: bold;
        }

        .slider-bar {
            flex: 1;
            height: 6px;
            background: #14161c;
            border-radius: 3px;
            margin: 0 15px;
            position: relative;
        }

        .slider-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff5722, #ff7043);
            border-radius: 3px;
        }

        .slider-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ffca28;
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px #ff5722;
        }

        .player-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            margin-bottom: 25px;
        }

        .btn-control {
            background: #232732;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            color: #ff5722;
            box-shadow: 5px 5px 10px #14161c, -5px -5px 10px #323848;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-main {
            background: #ff5722;
            border: none;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            color: #ffffff;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 6px 6px 12px #14161c, -6px -6px 12px #323848, inset 2px 2px 4px rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
        }

        .btn-main:active {
            transform: scale(0.95);
        }

        .btn-logout {
            background: #c62828;
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 4px 4px 8px #14161c;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="player-header">
            <button class="btn-mini"><i class="fas fa-volume-up"></i></button>
            <span class="live-badge">LIVE</span>
            <button class="btn-mini"><i class="fas fa-bars"></i></button>
        </div>

        <div class="circle-outer">
            <div class="circle-inner">
                <!-- Jika gambar logo belum ada, dia akan menampilkan ikon radio default -->
                <img src="logo-alfalah.png" alt="📻" id="radioCover" class="rotating" onerror="this.src='https://icons8.com';">
            </div>
        </div>

        <div class="radio-info">
            <h2>NGAOS AL FALAH PLOSO</h2>
            <p>TAFSIR JALALAIN & SHAHIH BUKHARI</p>
            <span id="statusIndicator" class="status-text text-muted">Klik Play untuk Mendengar</span>
        </div>

        <div class="progress-container">
            <span class="time-text" id="streamTime">0:00</span>
            <div class="slider-bar">
                <div class="slider-fill" style="width: 75%;"></div>
                <div class="slider-thumb" style="left: 75%;"></div>
            </div>
            <span class="time-text live-text">Live</span>
        </div>

        <div class="player-controls">
            <button class="btn-control"><i class="fas fa-backward"></i></button>
            <button class="btn-main" id="playBtn" onclick="toggleRadio()">
                <i class="fas fa-play" id="playIcon"></i>
            </button>
            <button class="btn-control"><i class="fas fa-forward"></i></button>
        </div>
        
        <button class="btn-logout" onclick="logout()">LOGOUT</button>
    </div>

    <script src="player.js"></script>
</body>
</html>
