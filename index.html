<!DOCTYPE html>
<html lang="id">
<head>
   <!-- Menghubungkan ke Manifest PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="NamaAplikasi">
 
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN NGAOS AL FALAH PLOSO</title>

    <!-- FontAwesome Icons (CDN Diperbaiki) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Clerk JS SDK -->
    <script
      async
      crossorigin="anonymous"
      id="clerk-sdk"
      src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js">
    </script>

    <link rel="stylesheet" href="css/login.css">
    <style>
        .logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="login-box">
        <div class="logo">
            <img src="logo-alfalah.png" alt="Logo Al Falah" onerror="this.style.display='none';">
        </div>
        <h1>NGAOS AL FALAH PLOSO</h1>
        <p>TAFSIR JALALAIN DAN SHAHIH BUKHORI</p>
        
        <form id="loginForm" novalidate>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Username" autocomplete="username" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
            </div>
            <label class="remember">
                <input type="checkbox" id="remember"> Remember Me
            </label>
            <button type="submit">LOGIN</button>
            <p id="message"></p>
        </form>
    </div>
    <!-- Script Konfigurasi & Aplikasi -->
    <script src="js/config.js"></script>
    <script>
      // Menghubungkan Publishable Key dari config.js ke tag Clerk SDK secara otomatis
      if (typeof CONFIG !== 'undefined' && CONFIG.CLERK_PUBLISHABLE_KEY) {
        document.getElementById('clerk-sdk').setAttribute('data-clerk-publishable-key', CONFIG.CLERK_PUBLISHABLE_KEY);
      }
    </script>
    <script src="js/crypto.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker terdaftar!', reg))
            .catch(err => console.log('Gagal mendaftarkan Service Worker:', err));
        });
      }
    </script>

</body>
</html>
