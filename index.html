<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN NGAOS AL FALAH PLOSO</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="css/login.css">
    <style>
        /* Mengoptimalkan ukuran dan bentuk lingkaran gambar agar tidak gepeng */
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="login-box">
        <!-- FIX LOGO: Mengganti emoji radio lama menjadi pemanggil file logo-alfalah.png -->
        <div class="logo">
            <img src="logo-alfalah.png" alt="Logo Al Falah" onerror="this.style.display='none';">
        </div>
        <h1>NGAOS AL FALAH PLOSO</h1>
        <p>TAFSIR JALALAIN DAN SHAHIH BUKHORI</p>
        
        <form id="loginForm" novalidate>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Username" autocomplete="username" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
            </div>
            <label class="remember">
                <input type="checkbox" id="remember"> Remember Me
            </label>
            <button type="submit">LOGIN</button>
            <p id="message"></p>
        </form>
    </div>

    <!-- Sistem Kontrol Sesi & Enkripsi -->
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/users.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
