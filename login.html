<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Register - Ngaos Al Falah Ploso</title>
  
  <link rel="stylesheet" href="css/login.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

  <!-- SDK Clerk -->
  <script
    async
    crossorigin="anonymous"
    id="clerk-sdk-alt"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js">
  </script>
</head>
<body>

  <div class="background"></div>
  <div class="login-box" style="max-width: 400px;">
    
    <!-- FORM LOGIN -->
    <div id="box-login">
      <form id="clerk-login-form">
        <div class="logo">
          <img src="logo-alfalah.png" alt="Logo Al-Falah" onerror="this.style.display='none';">
        </div>
        <h1>Masuk Ngaos</h1>
        <p>TAFSIR JALALAIN DAN SHAHIH BUKHARI</p>

        <div class="input-group">
          <i class='bx bxs-envelope'></i>
          <input type="email" id="login-email" placeholder="Alamat Email" required>
        </div>
        <div class="input-group">
          <i class='bx bxs-lock-alt'></i>
          <input type="password" id="login-password" placeholder="Kata Sandi" required>
        </div>
        <button type="submit">MASUK</button>
        <p id="login-error" class="error-msg" style="color:#f44336; margin-top:10px; display:none;"></p>
      </form>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script>
    if (typeof CONFIG !== 'undefined' && CONFIG.CLERK_PUBLISHABLE_KEY) {
      document.getElementById('clerk-sdk-alt').setAttribute('data-clerk-publishable-key', CONFIG.CLERK_PUBLISHABLE_KEY);
    }
  </script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
