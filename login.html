<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Register - Ngaos</title>
  
  <link rel="stylesheet" href="SignUp_LogIn_Form.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

  <!-- SDK Clerk -->
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="YOUR_PUBLISHABLE_KEY"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
</head>
<body>

  <div class="container">
    
    <!-- FORM LOGIN -->
    <div class="form-box login">
      <form id="clerk-login-form">
        <div class="logo-container">
          <img src="logo-alfalah.png" alt="Logo Al-Falah" class="app-logo">
        </div>
        <h1>Masuk</h1>
        <div class="input-box">
          <input type="email" id="login-email" placeholder="Alamat Email" required>
          <i class='bx bxs-envelope'></i>
        </div>
        <div class="input-box">
          <input type="password" id="login-password" placeholder="Kata Sandi" required>
          <i class='bx bxs-lock-alt'></i>
        </div>
        <p id="login-error" class="error-msg"></p>
        <button type="submit" class="btn" id="btn-login">Masuk</button>
      </form>
    </div>

    <!-- FORM REGISTER -->
    <div class="form-box register">
      <form id="clerk-register-form">
        <div class="logo-container">
          <img src="logo-alfalah.png" alt="Logo Al-Falah" class="app-logo">
        </div>
        <h1>Pendaftaran</h1>
        <div class="input-box">
          <input type="text" id="reg-name" placeholder="Nama Lengkap" required>
          <i class='bx bxs-user'></i>
        </div>
        <div class="input-box">
          <input type="email" id="reg-email" placeholder="Alamat Email" required>
          <i class='bx bxs-envelope'></i>
        </div>
        <div class="input-box">
          <input type="password" id="reg-password" placeholder="Kata Sandi" required>
          <i class='bx bxs-lock-alt'></i>
        </div>
        <p id="register-error" class="error-msg"></p>
        <button type="submit" class="btn" id="btn-register">Daftar Akun</button>
      </form>
    </div>

    <!-- SLIDING PANEL TOGGLE -->
    <div class="toggle-box">
      <div class="toggle-panel toggle-left">
        <h1>Selamat Datang!</h1>
        <p>Belum memiliki akun Ngaos?</p>
        <button class="btn register-btn">Daftar</button>
      </div>

      <div class="toggle-panel toggle-right">
        <h1>Ngaos</h1>
        <p>Sudah memiliki akun?</p>
        <button class="btn login-btn">Masuk</button>
      </div>
    </div>

  </div>

  <script src="SignUp_LogIn_Form.js"></script>
</body>
</html>
